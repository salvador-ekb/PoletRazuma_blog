<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест по истории Септуагинты</title>
    <meta name="description" content="история создания греческого перевода Библии и легенде о 70 старцах">
    <link rel="canonical" href="https://salvador-ekb.github.io/PoletRazuma_blog/septuaginta-test.html">
    <style>
        :root {
            --bg-color: #f8fafc;
            --accent-blue: #60a5fa;
            --dark-blue: #2563eb;
            --text-main: #1e293b;
            --card-bg: #ffffff;
        }
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            line-height: 1.6; 
            color: var(--text-main); 
            max-width: 750px; 
            margin: 0 auto; 
            padding: 40px 20px; 
            background: var(--bg-color); 
        }
        .card { 
            background: var(--card-bg); 
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            border: 1px solid #f1f5f9;
        }
        h1 { 
            color: #0f172a; 
            text-align: center; 
            font-size: 1.75rem;
            margin-bottom: 40px;
            font-weight: 800;
        }
        .progress { 
            font-size: 0.85rem; 
            color: var(--accent-blue); 
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 700;
            margin-bottom: 15px; 
        }
        .question { 
            font-size: 1.3rem; 
            font-weight: 600; 
            margin-bottom: 30px; 
            color: #334155;
            display: none; 
        }
        .options { display: grid; gap: 12px; }
        .options button { 
            padding: 16px 24px; 
            border: 2px solid #f1f5f9; 
            border-radius: 12px; 
            background: #fff; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            text-align: left; 
            font-size: 1rem; 
            color: #475569;
        }
        .options button:hover { 
            background: #f0f9ff; 
            border-color: var(--accent-blue);
            color: var(--dark-blue);
        }
        .feedback { 
            display: none; 
            margin-top: 25px; 
            padding: 20px; 
            border-radius: 12px; 
            background: #f8fafc; 
            border-left: 4px solid var(--accent-blue);
            font-size: 0.95rem;
        }
        #next-btn { 
            display: none; 
            margin-top: 30px; 
            width: 100%; 
            background: var(--accent-blue); 
            color: white; 
            border: none; 
            font-weight: 700; 
            padding: 18px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 1rem;
            transition: background 0.3s ease;
        }
        #next-btn:hover { background: var(--dark-blue); }
        #result-area { display: none; text-align: center; }
        #res-score { color: var(--dark-blue); font-size: 2.5rem; margin: 20px 0; }
        .restart-btn { 
            background: #f1f5f9; 
            color: #64748b; 
            width: auto; 
            margin-top: 30px; 
            padding: 12px 30px; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <h1>Насколько хорошо вы знаете историю греческой Библии?</h1>

    <div class="card" id="quiz-app">
        <div class="progress" id="progress">Вопрос 1 из 10</div>
        <div id="question-container"></div>
        <div class="feedback" id="feedback"></div>
        <button id="next-btn">Следующий вопрос →</button>
        
        <div id="result-area">
            <h2 id="res-title"></h2>
            <div id="res-score"></div>
            <p id="res-text" style="color: #475569; font-size: 1.1rem;"></p>
            <button class="restart-btn" onclick="location.reload()">Пройти тест заново</button>
        </div>
    </div>

    ﻿<script>
const quizData = {
questions: [
{
q: "1. Почему древний греческий перевод библейских текстов получил латинское название «Септуагинта» (Septuaginta)? ",
a: [
"А. Текст был разделен на 70 обязательных для прочтения тематических свитков. ",
"Б. В основу названия легла легенда о 70 (или 72) иудейских старцах-переводчиках. ",
"В. Перевод занял ровно 70 лет непрерывной работы александрийских писцов. ",
"Г. Это официальное обозначение, принятое «Советом Семидесяти» в Иерусалиме. "
],
correct: 1,
feedback: "Правильный ответ: Б. Само слово Septuaginta означает «семьдесят». Оно отсылает к античному преданию о том, что первосвященник Элеазар отправил из Иерусалима в Александрию 72 старейшины (по шесть от каждого из 12 колен Израилевых) для перевода Закона. Со временем число в названии округлили до семидесяти. "
},
{
q: "2. Что в строгом историческом и текстологическом смысле изначально называлось «Септуагинта»? ",
a: [
"А. Исключительно греческий перевод Пятикнижия (Торы), выполненный в III веке до н.э. ",
"Б. Весь корпус греческих переводов Ветхого Завета, включая Пророков и Писания. ",
"В. Собрание всех христианских рукописей, одобренных к чтению в Александрии. ",
"Г. Греческий перевод Пророческих книг, сделанный одновременно с Торой. "
],
correct: 0,
feedback: "Правильный ответ: А. Исторически легенда о «семидесяти» касалась исключительно Закона Моисеева. Именно перевод Торы является Септуагинтой в строгом смысле. Остальные книги переводились позже, другими людьми и в других условиях. Лишь столетия спустя, уже в христианскую эпоху, это название закрепилось за всем греческим Ветхим Заветом. "
},
{
q: "3. Как современные библеисты оценивают «Послание Аристея», описывающее заказ царя Птолемея II на греческий перевод и идеальное выполнение этого заказа? ",
a: [
"А. Как строгий исторический факт, буквально фиксирующий события. ",
"Б. Как римскую пропаганду, призванную высмеять иудейские обычаи. ",
"В. Как христианский миф, созданный для подтверждения святости греческого текста. ",
"Г. Как иудейскую апологию, созданную для легитимизации греческого текста в полемике с палестинской традицией. "
],
correct: 3,
feedback: "Правильный ответ: Г. Исследователи сходятся во мнении, что Послание Аристея — это искусная апология. Александрийской диаспоре было важно защитить авторитет своей греческой версии Писания. Легенда о чудесном согласии переводчиков и царском покровительстве служила мощным аргументом против тех (особенно в среде возвышающейся хасмонейской элиты), кто мог сомневаться в святости греческого перевода по сравнению с еврейским (протомасоретским) текстом. "
},
{
q: "4. Какой фактор делал невозможным существование греческой Библии в виде единого тома до II–III веков н.э.? ",
a: [
"А. Высокая стоимость египетского папируса, не позволявшая копировать большие объемы. ",
"Б. Отсутствие единого греческого диалекта (койне) в разных провинциях. ",
"В. Технические ограничения длины папирусного свитка. ",
"Г. Нехватка квалифицированных писцов, способных удерживать структуру длинного текста. "
],
correct: 2,
feedback: "Правильный ответ: В. Книгой в то время был свиток. Стандартный свиток редко превышал 10 метров в длину — этого едва хватало на одну большую книгу (например, Исаию или Бытие). Физически невозможно было склеить свиток такого размера, чтобы он вместил все книги Библии. "
},
{
q: "5. Какое технологическое новшество ранней церкви создало ощущение того, что греческая Библия — это единое и однородное произведение? ",
a: [
"А. Появление качественного пергамента, заменившего хрупкий папирус. ",
"Б. Массовое использование кодекса (книги с переплетенными страницами). ",
"В. Разработка системы деления текста на главы и стихи для удобства ссылок. ",
"Г. Создание единого канонического списка книг на Никейском соборе. "
],
correct: 1,
feedback: "Правильный ответ: Б. Формат кодекса позволил физически сшить под одной обложкой десятки разных произведений. Именно этот «переплет» создал у читателя ощущение, что перед ним одна книга, в то время как внутри скрывались тексты, переведенные в разное время, в разных местах и с разной степенью точности. "
},
{
q: "6. Как современные текстологи предпочитают называть первоначальные греческие переводы ветхозаветных книг (помимо Пятикнижия), чтобы избежать путаницы с изначальной Септуагинтой? ",
a: [
"А. Прото-Септуагинта (Proto-Septuagint). ",
"Б. Древнегреческий текст (Old Greek). ",
"В. Александрийская рецензия (Alexandrian Recension). ",
"Г. Гекзапла (Hexapla). "
],
correct: 1,
feedback: "Правильный ответ: Б. Поскольку термин «Септуагинта» технически закреплен за Пятикнижием, текстологам понадобился термин для обозначения самых ранних переводов других книг. Для этого в академической среде укоренился термин Old Greek (Древнегреческий текст). "
},
{
q: "7. Существовал ли в I веке н.э. унифицированный и общепризнанный греческий текст Ветхого Завета, на который могли бы опираться авторы Евангелий и апостол Павел? ",
a: [
"А. Да, к этому времени синагоги диаспоры повсеместно использовали единую и утвержденную «Александрийскую редакцию». ",
"Б. Да, существовал так называемый «Храмовый стандарт», текст которого был строго выверен иерусалимскими книжниками специально для перевода. ",
"В. Нет, текст находился в состоянии текучести: одна и та же библейская книга могла циркулировать в нескольких вариантах греческого перевода. ",
"Г. Нет, греческие переводы в I веке считались неофициальными, поэтому авторы Нового Завета всегда переводили цитаты с иврита самостоятельно. "
],
correct: 2,
feedback: "Правильный ответ: В. В I веке текст еще не был унифицирован. Авторы Евангелий не имели перед глазами «стандартного издания» — они цитировали разные версии греческих текстов, которые были у них под рукой и часто расходились как друг с другом, так и с позднейшим еврейским стандартом. "
},
{
q: "8. Какое археологическое открытие XX века кардинально изменило отношение ученых к расхождениям между Септуагинтой и традиционным еврейским (масоретским) текстом? ",
a: [
"А. Находка полного Синайского кодекса в монастыре святой Екатерины. ",
"Б. Обнаружение свитков Мертвого моря (Кумранских рукописей). ",
"В. Расшифровка древнеегипетских иероглифов на Розеттском камне. ",
"Г. Обнаружение архива Александрийской библиотеки в Оксиринхе. "
],
correct: 1,
feedback: "Правильный ответ: Б. До находок в Кумране многие считали, что отличия Септуагинты вызваны ошибками или вольностями греческих переводчиков. Однако среди свитков Мертвого моря были найдены древние еврейские тексты (например, книги пророка Иеремии и Царств), которые прекрасно согласовались с септуагинтой. Это доказало, что многое из того, что ранее считалось неточностями, на самом деле является следствием опоры на параллельные еврейские традиции, которые позже исчезли. "
},
{
q: "9. Что стало основной причиной того, что к концу II века н.э. иудейская традиция практически полностью отказалась от Септуагинты, хотя изначально она была создана именно в иудейской среде? ",
a: [
"А. Полный запрет на использование греческого языка в синагогах Римской империи после восстания Бар-Кохбы. ",
"Б. Физическое уничтожение всех эталонных рукописей перевода во время пожара в Александрии. ",
"В. Активное принятие Септуагинты христианами, а также развитие еврейского текста (масоретского стандарта). ",
"Г. Религиозное постановление о том, что Бог может слышать молитвы исключительно на «святом языке» (иврите). "
],
correct: 2,
feedback: "Правильный ответ: В. К этому привели два фактора. Во-первых, Септуагинта стала «Библией христиан», которые использовали её в полемике, доказывая мессианство Иисуса. Во-вторых, ко II веку в иудаизме утвердился единый стандарт еврейского текста (будущий масоретский), и старые греческие переводы стали казаться неточными из-за накопившихся расхождений. "
},
{
q: "10. Когда современный человек открывает современное издание с названием «Септуагинта», с чем именно он имеет дело? ",
a: [
"А. С точной копией самого древнего из дошедших до нас полных свитков 4 века до н.э. ",
"Б. С непрерывным текстом, который бережно и без изменений копировался византийской церковью с апостольских времен. ",
"В. С искусственной научной реконструкцией, собранной по кусочкам на основе сравнения великих кодексов и сотен других манускриптов. ",
"Г. С текстом, заново переведенным с масоретского оригинала в эпоху Возрождения, но сохранившим историческое название. "
],
correct: 2,
feedback: "Правильный ответ: В. В строгом смысле единой исторической «Септуагинты» не существует. Любое современное печатное издание — это эклектический текст. Ученые берут за основу великие христианские кодексы (Синайский, Ватиканский, Александрийский) и сравнивают их как между собой, так и с фрагментами других манускриптов, чтобы по крупицам реконструировать наиболее вероятный первоначальный вид греческого текста для каждой отдельной книги. "
}
],
results: [
{
min: 0,
max: 3,
title: "Первый взгляд на руины ",
text: "Перед вами — древняя мозаика, засыпанная землёй и временем. Вы видите только отдельные яркие камешки: красивое слово «Септуагинта», смутный силуэт семидесяти старцев и что-то про Александрию. Но как эти фрагменты соотносятся друг с другом и какой рисунок в итоге получается — пока неясно. Впрочем, любая реставрация начинается именно с этого: с умения признать, что картина перед тобой неполна. "
},
{
min: 4,
max: 6,
title: "Расчистка ",
text: "Перед вами — древняя мозаика, засыпанная землёй и временем. Вы сняли верхний слой и смогли распознать контуры рисунка.  Видно, что мозаика — не цельное полотно, а собрание фрагментов разных эпох, кое-где подогнанных друг к другу, а кое-где заменённых позднейшими вставками. Самое ценное на этом этапе — ваше понимание того, что целая картина может быть иллюзией, созданной переплётом кодекса. "
},
{
min: 7,
max: 9,
title: "Мастер с пинцетом ",
text: "Перед вами — древняя мозаика, засыпанная землёй и временем. Вы уверенно снимаете слой за слоем, различаете почрек разных мастеров, знаете, какой камешек положен в III веке до нашей эры, а какой добавлен лишь в IV веке нашей. Пара утраченных фрагментов ещё ставит вас в тупик, но общая композиция уже вполне понятна. Именно так и должен выглядеть честный взгляд на Септуагинту: это живая традиция, которая изменялась во времени. "
},
{
min: 10,
max: 10,
title: "Мудрец ",
text: "Поздравляем! Вы продемонстрировали глубокое понимание сложнейшего процесса формирования греческой Библии. Для вас Септуагинта — это не застывший памятник, а динамичный и многослойный текст, хранящий следы истории, технологий и богословских дискуссий. "
}
]
};
</script>

    <script>
        let currentIdx = 0;
        let score = 0;

        const qContainer = document.getElementById('question-container');
        const feedback = document.getElementById('feedback');
        const nextBtn = document.getElementById('next-btn');
        const progress = document.getElementById('progress');
        const resultArea = document.getElementById('result-area');

        function renderQuestion() {
            const data = quizData.questions[currentIdx];
            feedback.style.display = 'none';
            nextBtn.style.display = 'none';
            progress.innerText = `Вопрос ${currentIdx + 1} из ${quizData.questions.length}`;
            
            let html = `<div class="question" style="display:block">${data.q}</div><div class="options">`;
            data.a.forEach((opt, i) => {
                html += `<button onclick="checkAnswer(${i})">${opt}</button>`;
            });
            html += `</div>`;
            qContainer.innerHTML = html;
        }

        window.checkAnswer = function(idx) {
            const data = quizData.questions[currentIdx];
            const buttons = qContainer.querySelectorAll('button');
            buttons.forEach(b => b.disabled = true);
            
            if(idx === data.correct) {
                score++;
                buttons[idx].style.background = "#f0fdf4";
                buttons[idx].style.borderColor = "#22c55e";
                buttons[idx].style.color = "#166534";
            } else {
                buttons[idx].style.background = "#fef2f2";
                buttons[idx].style.borderColor = "#ef4444";
                buttons[idx].style.color = "#991b1b";
                buttons[data.correct].style.background = "#f0fdf4";
                buttons[data.correct].style.borderColor = "#22c55e";
            }
            
            feedback.innerHTML = `<strong>Разбор:</strong> ${data.feedback}`;
            feedback.style.display = 'block';
            nextBtn.style.display = 'block';
        };

        nextBtn.onclick = () => {
            currentIdx++;
            if(currentIdx < quizData.questions.length) {
                renderQuestion();
            } else {
                showResult();
            }
        };

        function showResult() {
            qContainer.style.display = 'none';
            progress.style.display = 'none';
            feedback.style.display = 'none';
            nextBtn.style.display = 'none';
            
            const final = quizData.results.find(r => score >= r.min && score <= r.max);
            
            document.getElementById('res-title').innerText = final.title;
            document.getElementById('res-score').innerText = `${score} / 10`;
            document.getElementById('res-text').innerText = final.text;
            resultArea.style.display = 'block';
        }

        renderQuestion();
    </script>
</body>
</html>
